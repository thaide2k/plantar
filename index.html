<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Farm Companion FiveM</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060e06;overflow-x:hidden}
@keyframes gY{0%,100%{box-shadow:0 0 8px #fbbf2466}50%{box-shadow:0 0 24px #fbbf24cc}}
@keyframes gR{0%,100%{box-shadow:0 0 8px #ef444466;border-color:#ef4444!important}50%{box-shadow:0 0 28px #ef4444cc}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes toast{0%{opacity:0;transform:translateY(16px)}12%{opacity:1;transform:translateY(0)}82%{opacity:1}100%{opacity:0}}
@keyframes pulse{from{opacity:0.6}to{opacity:1}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.urg{animation:gY 1.2s infinite}
.crit{animation:gR 0.8s infinite}
.rdy{animation:gY 1.5s infinite}
.card{animation:fadeUp 0.35s ease}
input:focus{outline:2px solid #4ade80!important}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a140a}
::-webkit-scrollbar-thumb{background:#4ade8044;border-radius:3px}
.sujo-popping{animation:pop 0.25s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ══════════════════════════════════════════════
   FARM COMPANION — constantes e helpers
══════════════════════════════════════════════ */
const STAGES=[
  {min:0,  label:"Semente",  emoji:"🌱"},
  {min:20, label:"Brotando", emoji:"🌿"},
  {min:40, label:"Crescendo",emoji:"🍃"},
  {min:70, label:"Maturando",emoji:"🌾"},
  {min:100,label:"Pronta!",  emoji:"✅"},
];
const getStage=p=>{let s=STAGES[0];for(const x of STAGES){if(p>=x.min)s=x;}return s;};
const fmt=sec=>{if(sec<=0)return"00:00";const m=Math.floor(sec/60),s=sec%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;};
const ni=v=>Math.max(0,parseInt(v)||0);
const fmtSP=ts=>new Date(ts).toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo",hour:"2-digit",minute:"2-digit"});
const toICSDate=ts=>{const d=new Date(ts);return d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";};
const downloadICS=(plant,growMin,intervaloMin)=>{
  const care1=plant.plantedAt+intervaloMin*60*1000;
  const harvest=plant.plantedAt+growMin*60*1000;
  const uid=()=>Math.random().toString(36).substr(2,9)+"@farmcompanion";
  const alarm=(minBefore)=>`BEGIN:VALARM\r\nTRIGGER:-PT${minBefore}M\r\nACTION:DISPLAY\r\nDESCRIPTION:Lembrete Farm Companion\r\nEND:VALARM`;
  const evt=(uid,start,end,summary,desc)=>
    `BEGIN:VEVENT\r\nUID:${uid}\r\nDTSTAMP:${toICSDate(Date.now())}\r\nDTSTART:${toICSDate(start)}\r\nDTEND:${toICSDate(end)}\r\nSUMMARY:${summary}\r\nDESCRIPTION:${desc}\r\n${alarm(5)}\r\nEND:VEVENT`;
  const lines=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Farm Companion//FiveM//PT","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    evt(uid(),care1,care1+5*60*1000,`💧 Regar + Adubar — ${plant.name}`,"Hora de regar e adubar sua planta no FiveM!"),
    evt(uid(),harvest,harvest+5*60*1000,`🌾 Colher — ${plant.name} (×${plant.quantity})`,"Sua planta está pronta para colheita no FiveM!"),
    "END:VCALENDAR"
  ].join("\r\n");
  const blob=new Blob([lines],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`farm-${plant.name.replace(/\s/g,"-").toLowerCase()}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
const DEF={custoSemente:50,custoVaso:25,custoRegador:20,custoFert:35,intervaloMin:90,crescPct:5,crescMin:9,qtdAgua:2,qtdFert:2};

/* ══════════════════════════════════════════════
   CALCULADORA SUJO — componente
══════════════════════════════════════════════ */
function CalcSujo(){
  const S2={fontFamily:"'Share Tech Mono',monospace"};
  const RJ={fontFamily:"'Rajdhani',sans-serif"};
  const OR={fontFamily:"'Orbitron',monospace"};

  const [qty,setQty]=useState("");
  const [unitPrice,setUnitPrice]=useState("");
  const [sujoTotal,setSujoTotal]=useState("");
  const [popEl,setPopEl]=useState(null);

  const triggerPop=id=>{
    setPopEl(id);
    setTimeout(()=>setPopEl(null),300);
  };

  const q=parseFloat(qty)||0;
  const u=parseFloat(unitPrice)||0;
  const sj=parseFloat(sujoTotal)||0;

  const totalCost=q*u;
  const sujo60=sj*0.6;
  const sujo40=sj*0.4;
  const profit=sujo60-totalCost;
  const avgUnit=q>0?sujo60/q:0;
  const avgProfit=q>0?profit/q:0;
  const avgCost=q>0?totalCost/q:0;

  const empty=sj===0&&totalCost===0;

  const fmtR=val=>"R$ "+val.toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");

  const resetAll=()=>{setQty("");setUnitPrice("");setSujoTotal("");};

  const GOLD="#c9a84c";
  const GOLD_L="#f0c96e";
  const GOLD_D="#7a6230";
  const GREEN="#39e08a";
  const RED="#e05050";
  const MUTED="#5a6070";
  const PANEL="#111318";
  const BORDER="#1e2330";
  const TEXT="#d8dde8";

  const card={
    background:PANEL,border:"1px solid "+BORDER,borderRadius:14,padding:24,marginBottom:14,
    position:"relative",overflow:"hidden",animation:"fadeUp 0.5s ease both"
  };
  const fieldLabel={fontSize:"0.78rem",fontWeight:600,color:MUTED,letterSpacing:"0.08em",
    textTransform:"uppercase",...RJ,display:"block",marginBottom:6};
  const inputBase={
    background:"rgba(255,255,255,0.04)",border:"1px solid "+BORDER,borderRadius:8,color:TEXT,
    ...S2,fontSize:"1.05rem",padding:"12px 14px",outline:"none",width:"100%",transition:"border-color .2s,background .2s,box-shadow .2s"
  };
  const resultLabel={fontSize:"0.9rem",color:MUTED,fontWeight:600,letterSpacing:"0.04em",...RJ};
  const resultVal={...S2,fontSize:"1.05rem",color:TEXT,transition:"all .3s ease"};

  const profitColor=empty?MUTED:profit>0?GREEN:profit<0?RED:MUTED;
  const profitText=empty?"R$ 0,00":fmtR(Math.abs(profit));
  const profitSub=empty?"Preencha os campos acima":
    profit>0?`Você lucrou ${fmtR(profit)} nessa operação 🚀`:
    profit<0?`Você teve prejuízo de ${fmtR(Math.abs(profit))} nessa operação`:
    "Operação zerada — sem lucro, sem prejuízo";
  const badgeLabel=empty?"aguardando":profit>0?"📈 Lucro":profit<0?"📉 Prejuízo":"⚖️ Neutro";
  const badgeBg=empty?"rgba(90,96,112,.15)":profit>0?"rgba(57,224,138,.12)":profit<0?"rgba(224,80,80,.12)":"rgba(90,96,112,.15)";
  const badgeColor=empty?MUTED:profit>0?GREEN:profit<0?RED:MUTED;
  const badgeBorder=empty?"rgba(90,96,112,.2)":profit>0?"rgba(57,224,138,.25)":profit<0?"rgba(224,80,80,.25)":"rgba(90,96,112,.2)";

  return(
    <div style={{maxWidth:520,margin:"0 auto",padding:"0 0 40px",position:"relative",zIndex:1}}>

      {/* Background decorativo */}
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none",zIndex:0}}/>

      {/* Header */}
      <div style={{textAlign:"center",marginBottom:28,animation:"fadeUp .5s ease"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:6}}>
          <div style={{width:44,height:44,background:`linear-gradient(135deg,${GOLD},${GOLD_D})`,borderRadius:10,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,
            boxShadow:`0 0 20px rgba(201,168,76,0.3)`}}>💰</div>
          <div style={{fontSize:"2rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",
            background:`linear-gradient(135deg,${GOLD_L},${GOLD},#8a6a20)`,
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",...RJ}}>
            Calc Sujo
          </div>
        </div>
        <div style={{...S2,fontSize:"0.72rem",color:MUTED,letterSpacing:"0.2em",textTransform:"uppercase"}}>
          Calculadora de Ganhos em Moeda Virtual
        </div>
      </div>

      {/* Card 1 — Compra */}
      <div style={{...card,animationDelay:"0.1s"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${GOLD},transparent)`,opacity:.6}}/>
        <div style={{...S2,fontSize:"0.68rem",color:GOLD_D,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:4}}>Passo 01</div>
        <div style={{...RJ,fontSize:"1.15rem",fontWeight:700,color:TEXT,letterSpacing:"0.05em",marginBottom:20}}>
          Itens Comprados{" "}
          <span style={{...S2,fontSize:"0.65rem",letterSpacing:"0.15em",padding:"2px 8px",borderRadius:4,background:`rgba(201,168,76,0.12)`,color:GOLD,border:`1px solid rgba(201,168,76,0.2)`,verticalAlign:"middle",marginLeft:8}}>COMPRA</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <label style={fieldLabel}>Quantidade</label>
            <input type="number" min="0" step="1" placeholder="0" value={qty}
              onChange={e=>{setQty(e.target.value);triggerPop("cost");}}
              style={inputBase}/>
          </div>
          <div>
            <label style={fieldLabel}>Valor Unitário ($)</label>
            <input type="number" min="0" step="0.01" placeholder="0,00" value={unitPrice}
              onChange={e=>{setUnitPrice(e.target.value);triggerPop("cost");}}
              style={inputBase}/>
          </div>
        </div>
        <hr style={{border:"none",borderTop:"1px solid "+BORDER,margin:"18px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={resultLabel}>Total investido</span>
          <span className={popEl==="cost"?"sujo-popping":""} style={{...resultVal,color:GOLD_L,fontSize:"1.2rem"}}>{fmtR(totalCost)}</span>
        </div>
      </div>

      {/* Card 2 — Sujo */}
      <div style={{...card,animationDelay:"0.2s"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${GREEN},transparent)`,opacity:.6}}/>
        <div style={{...S2,fontSize:"0.68rem",color:GOLD_D,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:4}}>Passo 02</div>
        <div style={{...RJ,fontSize:"1.15rem",fontWeight:700,color:TEXT,letterSpacing:"0.05em",marginBottom:20}}>
          Ganho em Sujo{" "}
          <span style={{...S2,fontSize:"0.65rem",letterSpacing:"0.15em",padding:"2px 8px",borderRadius:4,background:"rgba(57,224,138,0.1)",color:GREEN,border:"1px solid rgba(57,224,138,0.2)",verticalAlign:"middle",marginLeft:8}}>SUJO</span>
        </div>
        <div>
          <label style={fieldLabel}>Total recebido em Sujo</label>
          <input type="number" min="0" step="0.01" placeholder="0,00" value={sujoTotal}
            onChange={e=>{setSujoTotal(e.target.value);triggerPop("sujo60");}}
            style={{...inputBase}}/>
        </div>
        <hr style={{border:"none",borderTop:"1px solid "+BORDER,margin:"18px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
          <span style={resultLabel}>60% do Sujo (valor real)</span>
          <span className={popEl==="sujo60"?"sujo-popping":""} style={{...resultVal,color:GOLD_L,fontSize:"1.2rem"}}>{fmtR(sujo60)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
          <span style={resultLabel}>40% retido</span>
          <span style={{...resultVal,color:MUTED}}>{fmtR(sujo40)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
          <span style={resultLabel}>Valor médio por unidade</span>
          <span style={{...resultVal,color:GOLD_L}}>{fmtR(avgUnit)}</span>
        </div>
      </div>

      {/* Card resultado */}
      <div style={{
        background:PANEL,border:"1px solid "+BORDER,borderRadius:14,padding:"28px 24px",
        textAlign:"center",position:"relative",overflow:"hidden",animation:"fadeUp 0.5s ease 0.4s both"
      }}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,
          background:`linear-gradient(90deg,transparent,${empty?GREEN:profit>=0?GREEN:RED},transparent)`}}/>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
          width:200,height:200,borderRadius:"50%",
          background:`radial-gradient(circle,${profit<0?"rgba(224,80,80,0.07)":"rgba(57,224,138,0.07)"} 0%,transparent 70%)`,
          pointerEvents:"none",transition:"background .4s"}}/>

        <div style={{...S2,fontSize:"0.68rem",letterSpacing:"0.22em",textTransform:"uppercase",color:MUTED,marginBottom:10}}>
          ✦ Lucro Real da Operação ✦
        </div>
        <div className={popEl==="profit"?"sujo-popping":""} style={{
          fontFamily:"'Rajdhani',sans-serif",fontSize:"2.8rem",fontWeight:700,
          letterSpacing:"0.02em",color:profitColor,transition:"color .3s",lineHeight:1,marginBottom:4
        }}>{profitText}</div>
        <div style={{...RJ,fontSize:"0.8rem",color:MUTED,fontWeight:500,marginBottom:10}}>{profitSub}</div>
        <div>
          <span style={{
            display:"inline-block",padding:"3px 10px",borderRadius:20,
            ...S2,fontSize:"0.72rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:10,
            background:badgeBg,color:badgeColor,border:"1px solid "+badgeBorder
          }}>{badgeLabel}</span>
        </div>

        <hr style={{border:"none",borderTop:"1px solid "+BORDER,margin:"18px 0 0"}}/>
        <div style={{display:"flex",justifyContent:"center",gap:40,marginTop:14}}>
          <div style={{textAlign:"center"}}>
            <div style={{...RJ,fontSize:"0.7rem",color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Ganho médio / unidade</div>
            <div style={{...S2,fontSize:"1.15rem",color:profit<0?RED:profit>0?GREEN:MUTED}}>{fmtR(Math.abs(avgProfit))}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{...RJ,fontSize:"0.7rem",color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Custo médio / unidade</div>
            <div style={{...S2,fontSize:"1.15rem",color:MUTED}}>{fmtR(avgCost)}</div>
          </div>
        </div>
      </div>

      <button onClick={resetAll} style={{
        display:"block",width:"100%",marginTop:14,padding:12,background:"transparent",
        border:"1px solid "+BORDER,borderRadius:8,color:MUTED,...RJ,fontSize:"0.85rem",
        fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",
        animation:"fadeUp 0.5s ease 0.5s both",transition:"all .2s"
      }}
      onMouseEnter={e=>{e.target.style.borderColor=GOLD_D;e.target.style.color=GOLD;e.target.style.background="rgba(201,168,76,0.05)";}}
      onMouseLeave={e=>{e.target.style.borderColor=BORDER;e.target.style.color=MUTED;e.target.style.background="transparent";}}>
        ↺ &nbsp;Limpar Tudo
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════════════ */
function App(){
  const [activeTab,setActiveTab]=useState("farm");
  const [cfg,setCfg]=useState(DEF);
  const [dCfg,setDCfg]=useState(DEF);
  const [showCfg,setShowCfg]=useState(false);
  const [plants,setPlants]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [showGuide,setShowGuide]=useState(false);
  const [guideQty,setGuideQty]=useState(1);
  const [qty,setQty]=useState(1);
  const [sellPrice,setSellPrice]=useState(1000);
  const [now,setNow]=useState(Date.now());
  const [toasts,setToasts]=useState([]);
  const aRef=useRef(null);
  const alRef=useRef({});

  const growMin=(100/cfg.crescPct)*cfg.crescMin;
  const custoAgua=cfg.qtdAgua*cfg.custoRegador;
  const custoFertTotal=cfg.qtdFert*cfg.custoFert;
  const custoCuid=custoAgua+custoFertTotal;
  const custoFixo=cfg.custoSemente+cfg.custoVaso;
  const custoTotal=custoFixo+custoCuid;

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);

  const playAlarm=type=>{
    try{
      if(!aRef.current)aRef.current=new(window.AudioContext||window.webkitAudioContext)();
      const ctx=aRef.current;
      const freqs=type==="ready"?[880,1100,880,1100,1320]:[440,550,440,550];
      freqs.forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type="square";
        g.gain.setValueAtTime(.07,ctx.currentTime+i*.18);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.18+.16);
        o.start(ctx.currentTime+i*.18);o.stop(ctx.currentTime+i*.18+.18);
      });
    }catch(e){}
  };

  const toast=(msg,color="#4ade80")=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,color}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };

  useEffect(()=>{
    plants.forEach(p=>{
      const cl=Math.max(0,p.nextCare-now);
      const k=String(p.id);
      if(cl===0&&!alRef.current[k]){alRef.current[k]=true;playAlarm("care");toast("⚠️ "+p.name+" — hora de regar + adubar!","#fbbf24");}
      if(cl>0)alRef.current[k]=false;
      const pct=gPct(p,now);
      const rk=k+"_r";
      if(pct>=100&&!alRef.current[rk]){alRef.current[rk]=true;playAlarm("ready");toast("✅ "+p.name+" pronta para colher!","#4ade80");}
    });
  },[now,plants]);

  const gPct=(plant,ts)=>Math.min(100,((ts-plant.plantedAt)/60000/growMin)*100);

  const saveCfg=()=>{
    const nc={
      custoSemente:Math.max(0,ni(dCfg.custoSemente)),custoVaso:Math.max(0,ni(dCfg.custoVaso)),
      custoRegador:Math.max(0,ni(dCfg.custoRegador)),custoFert:Math.max(0,ni(dCfg.custoFert)),
      intervaloMin:Math.max(1,ni(dCfg.intervaloMin)),crescPct:Math.max(1,ni(dCfg.crescPct)),
      crescMin:Math.max(1,ni(dCfg.crescMin)),qtdAgua:Math.max(1,ni(dCfg.qtdAgua)),qtdFert:Math.max(1,ni(dCfg.qtdFert)),
    };
    setCfg(nc);setShowCfg(false);toast("⚙️ Configurações salvas!","#a78bfa");
  };

  const addPlant=()=>{
    const q=Math.max(1,parseInt(qty)||1);
    const p={
      id:Date.now(),name:"Planta #"+(plants.length+1),quantity:q,
      plantedAt:Date.now(),nextCare:Date.now()+cfg.intervaloMin*60*1000,
      careCount:0,sellPrice:parseInt(sellPrice)||0,sn:{...cfg},
      costs:{semente:cfg.custoSemente*q,vaso:cfg.custoVaso*q,agua:custoAgua*q,fert:custoFertTotal*q},
    };
    setPlants(prev=>[...prev,p]);setShowAdd(false);toast("🌱 "+p.name+" plantada! (×"+q+")");
  };

  const doCare=id=>{
    const p=plants.find(x=>x.id===id);if(!p)return;
    setPlants(prev=>prev.map(x=>x.id===id?{...x,nextCare:Date.now()+x.sn.intervaloMin*60*1000,careCount:x.careCount+1}:x));
    toast("💧🌿 Rega + adubo registrados!");
  };

  const rmPlant=id=>setPlants(prev=>prev.filter(p=>p.id!==id));
  const totalInv=plants.reduce((a,p)=>a+Object.values(p.costs).reduce((x,y)=>x+y,0),0);
  const totalRev=plants.reduce((a,p)=>a+p.sellPrice*p.quantity,0);

  const S={fontFamily:"'Share Tech Mono',monospace"};
  const OR={fontFamily:"'Orbitron',monospace"};
  const inp={background:"#0a140a",border:"1px solid #4ade8033",color:"#d1fae5",padding:"10px 14px",borderRadius:8,...S,fontSize:15,width:"100%"};

  /* ── TAB BAR ── */
  const tabs=[
    {id:"farm", icon:"🌿", label:"FARM"},
    {id:"sujo", icon:"💰", label:"CALC SUJO"},
  ];

  return(
<div style={{minHeight:"100vh",background:"#060e06",...S,color:"#b6f5c8",position:"relative"}}>
  <div style={{position:"fixed",inset:0,pointerEvents:"none",backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,80,.012) 3px,rgba(0,255,80,.012) 4px)",zIndex:0}}/>
  <div style={{position:"fixed",inset:0,pointerEvents:"none",backgroundImage:"radial-gradient(ellipse at 50% 0%,rgba(0,255,80,.07) 0%,transparent 65%)",zIndex:0}}/>

  {/* Toast container */}

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowCfg(false)} style={{flex:1,background:"transparent",border:"1px solid #a78bfa22",color:"#a78bfa66",padding:"11px 0",borderRadius:8,cursor:"pointer",...S,fontSize:11,letterSpacing:2}}>CANCELAR</button>
            <button onClick={saveCfg} style={{flex:2,background:"linear-gradient(135deg,#4c1d95,#7c3aed)",border:"1px solid #a78bfa",color:"#ede9fe",padding:"11px 0",borderRadius:8,cursor:"pointer",...S,fontSize:12,fontWeight:900,letterSpacing:2}}>✓ SALVAR</button>
          </div>
        </div>
      </div>
    </div>
  )}

  {/* ══ MODAL LISTA ══ */}
  {showGuide&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,padding:16,overflowY:"auto"}}>
      <div style={{background:"#070d04",border:"1px solid #fbbf2444",borderRadius:16,padding:26,width:"100%",maxWidth:500,boxShadow:"0 0 60px #fbbf2415",animation:"fadeUp .3s ease",margin:"20px auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{...OR,color:"#fbbf24",fontSize:15,letterSpacing:2}}>🛒 LISTA DE COMPRAS</h2>
          <button onClick={()=>setShowGuide(false)} style={{background:"transparent",border:"none",color:"#fbbf2466",cursor:"pointer",fontSize:20}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:10,color:"#fbbf2077",letterSpacing:2,display:"block",marginBottom:6}}>QUANTAS PLANTAS?</label>
            <input type="number" min="1" value={guideQty}
              onChange={e=>setGuideQty(Math.max(1,parseInt(e.target.value)||1))}
              style={{width:"100%",background:"#0a140a",border:"1px solid #fbbf2433",color:"#fef3c7",padding:"12px 14px",borderRadius:8,...OR,fontSize:24,fontWeight:900,textAlign:"center"}}/>
          </div>
          {(()=>{
            const q=Math.max(1,guideQty);
            const itens=[
              {e:"🌱",n:"Semente",      qtd:q,              u:cfg.custoSemente,  tot:cfg.custoSemente*q,      c:"#86efac"},
              {e:"🪴",n:"Vaso",          qtd:q,              u:cfg.custoVaso,     tot:cfg.custoVaso*q,          c:"#86efac"},
              {e:"💧",n:"Água (regador)",qtd:cfg.qtdAgua*q,  u:cfg.custoRegador,  tot:cfg.custoRegador*cfg.qtdAgua*q,  c:"#93c5fd"},
              {e:"🌿",n:"Fertilizante",  qtd:cfg.qtdFert*q,  u:cfg.custoFert,     tot:cfg.custoFert*cfg.qtdFert*q,     c:"#6ee7b7"},
            ];
            const tot=itens.reduce((a,b)=>a+b.tot,0);
            return(
              <>
                <div style={{background:"rgba(0,0,0,.4)",border:"1px solid #fbbf2422",borderRadius:10,overflow:"hidden"}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 14px",background:"rgba(251,191,36,.06)",borderBottom:"1px solid #fbbf2422"}}>
                    {["ITEM","QTD","UNIT.","TOTAL"].map(h=>(<div key={h} style={{fontSize:9,letterSpacing:2,color:"#fbbf2077",textAlign:h==="ITEM"?"left":"right"}}>{h}</div>))}
                  </div>
                  {itens.map((it,i)=>(
                    <div key={it.n} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"11px 14px",borderBottom:i<itens.length-1?"1px solid #fbbf2411":"none",alignItems:"center"}}>
                      <div style={{fontSize:13,color:it.c}}>{it.e} {it.n}</div>
                      <div style={{textAlign:"right",...OR,fontSize:14,fontWeight:900,color:"#fef3c7"}}>{it.qtd}</div>
                      <div style={{textAlign:"right",fontSize:11,color:"#fbbf2055"}}>${it.u}</div>
                      <div style={{textAlign:"right",...OR,fontSize:13,fontWeight:700,color:"#fbbf24"}}>${it.tot.toLocaleString()}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(251,191,36,.04)",border:"1px solid #fbbf2022",borderRadius:8,padding:"9px 13px",fontSize:10,color:"#fbbf2055"}}>
                  💡 Água: {cfg.qtdAgua}×/planta · Fertilizante: {cfg.qtdFert}×/planta · Ciclo total: {growMin}min
                </div>
                <div style={{background:"rgba(251,191,36,.08)",border:"2px solid #fbbf2466",borderRadius:10,padding:"16px 20px"}}>
                  <div style={{fontSize:9,letterSpacing:3,color:"#fbbf2077",marginBottom:7}}>💰 TOTAL PARA LEVAR</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div style={{fontSize:11,color:"#fbbf2055"}}>{q} planta{q>1?"s":""} × ${custoTotal}/cada</div>
                    <div style={{...OR,fontSize:32,fontWeight:900,color:"#fbbf24",textShadow:"0 0 20px #fbbf2488"}}>${tot.toLocaleString()}</div>
                  </div>
                </div>
                <button onClick={()=>{setShowGuide(false);setQty(guideQty);setShowAdd(true);}}
                  style={{width:"100%",background:"linear-gradient(135deg,#14532d,#16a34a)",border:"1px solid #4ade80",color:"#d1fae5",padding:"13px 0",borderRadius:8,cursor:"pointer",...S,fontSize:13,fontWeight:900,letterSpacing:2}}>
                  🌱 JÁ COMPREI — PLANTAR AGORA
                </button>
              </>
            );
          })()}
        </div>
      </div>
    </div>
  )}

  {/* ══ MODAL NOVA PLANTA ══ */}
  {showAdd&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,padding:16,overflowY:"auto"}}>
      <div style={{background:"#070f07",border:"1px solid #4ade8044",borderRadius:16,padding:26,width:"100%",maxWidth:440,boxShadow:"0 0 60px #4ade8022",animation:"fadeUp .3s ease",margin:"20px auto"}}>
        <h2 style={{...OR,color:"#4ade80",fontSize:15,marginBottom:20,letterSpacing:2}}>🌱 NOVA PLANTAÇÃO</h2>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:10,color:"#4ade8077",letterSpacing:2,display:"block",marginBottom:6}}>QUANTIDADE DE PLANTAS</label>
            <input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} style={inp}/>
          </div>
          <div>
            <label style={{fontSize:10,color:"#4ade8077",letterSpacing:2,display:"block",marginBottom:6}}>PREÇO DE VENDA (por unidade)</label>
            <input type="number" min="0" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} style={inp}/>
          </div>
          {(()=>{
            const q=Math.max(1,parseInt(qty)||1);
            const sp=parseInt(sellPrice)||0;
            const cost=custoTotal*q;
            const rev=sp*q;
            const luc=rev-cost;
            return(
              <div style={{background:"rgba(74,222,128,.04)",border:"1px solid #4ade8022",borderRadius:10,padding:14}}>
                <div style={{fontSize:9,letterSpacing:2,color:"#4ade8055",marginBottom:9}}>RESUMO DO LOTE</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,fontSize:11,marginBottom:9}}>
                  {[
                    ["Qtd",               q+" plantas"],
                    ["Fixo",              "$"+(custoFixo*q).toLocaleString()],
                    ["💧 Água ("+cfg.qtdAgua+"×)", "$"+(custoAgua*q).toLocaleString()],
                    ["🌿 Fert ("+cfg.qtdFert+"×)", "$"+(custoFertTotal*q).toLocaleString()],
                    ["Custo total",       "$"+cost.toLocaleString()],
                    ["Lucro est.",        "$"+luc.toLocaleString()],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 8px",background:"rgba(0,0,0,.3)",borderRadius:6}}>
                      <span style={{color:"#4ade8066"}}>{k}</span>
                      <span style={{color:k==="Lucro est."?(luc>=0?"#4ade80":"#f87171"):"#d1fae5"}}>{v}</span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:9,color:"#4ade8044"}}>⏱ {growMin}min · rega a cada {cfg.intervaloMin}min</div>
                <div style={{marginTop:10,borderTop:"1px solid #4ade8022",paddingTop:10,display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#4ade8055",marginBottom:2}}>📅 HORÁRIOS PREVISTOS (SP)</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"rgba(251,191,36,.06)",borderRadius:6,border:"1px solid #fbbf2422"}}>
                    <span style={{fontSize:10,color:"#fbbf2088"}}>💧🌿 1ª rega + adubo</span>
                    <span style={{...OR,fontSize:13,fontWeight:900,color:"#fbbf24"}}>agora (ao plantar)</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"rgba(251,191,36,.06)",borderRadius:6,border:"1px solid #fbbf2422"}}>
                    <span style={{fontSize:10,color:"#fbbf2088"}}>💧🌿 2ª rega + adubo</span>
                    <span style={{...OR,fontSize:13,fontWeight:900,color:"#fbbf24"}}>{fmtSP(Date.now()+cfg.intervaloMin*60*1000)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"rgba(74,222,128,.06)",borderRadius:6,border:"1px solid #4ade8033"}}>
                    <span style={{fontSize:10,color:"#4ade8088"}}>🌾 Colheita</span>
                    <span style={{...OR,fontSize:14,fontWeight:900,color:"#4ade80"}}>{fmtSP(Date.now()+growMin*60*1000)}</span>
                  </div>
                </div>
              </div>
            );
          })()}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowAdd(false)} style={{flex:1,background:"transparent",border:"1px solid #4ade8022",color:"#4ade8077",padding:"11px 0",borderRadius:8,cursor:"pointer",...S,fontSize:11,letterSpacing:2}}>CANCELAR</button>
            <button onClick={addPlant} style={{flex:2,background:"linear-gradient(135deg,#14532d,#16a34a)",border:"1px solid #4ade80",color:"#d1fae5",padding:"11px 0",borderRadius:8,cursor:"pointer",...S,fontSize:12,fontWeight:900,letterSpacing:2}}>🌱 PLANTAR</button>
          </div>
        </div>
      </div>
    </div>
  )}
</div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
